<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Committee Report — Central Baptist Church</title>
  <link href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/quill-table-better@1/dist/quill-table-better.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/quill-table-better@1/dist/quill-table-better.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 16px;
      line-height: 1.5;
      color: #1a1a1a;
      background: #f5f5f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .card {
      max-width: 680px;
      margin: 0 auto;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 3px rgba(0,0,0,.12);
      padding: 2rem 2.5rem;
    }
    h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: .25rem; }
    .subtitle { color: #666; font-size: .9rem; margin-bottom: 1.75rem; }
    .field { margin-bottom: 1.25rem; }
    label { display: block; font-weight: 600; font-size: .875rem; margin-bottom: .4rem; }
    select, input[type="text"], input[type="email"] {
      width: 100%; padding: .5rem .75rem;
      border: 1px solid #ccc; border-radius: 4px;
      font-size: 1rem; font-family: inherit;
      transition: border-color .15s;
    }
    select:focus, input:focus { outline: none; border-color: #5b6fbf; }
    .editor-label { font-weight: 600; font-size: .875rem; margin-bottom: .4rem; }
    #editor-container { border: 1px solid #ccc; border-radius: 4px; overflow: hidden; }
    .ql-toolbar.ql-snow { border: none; border-bottom: 1px solid #ccc; }
    .ql-container.ql-snow { border: none; font-size: 1rem; min-height: 220px; }
    .actions { margin-top: 1.5rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    button[type="submit"] {
      padding: .6rem 1.5rem; background: #5b6fbf; color: #fff;
      border: none; border-radius: 4px; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    button[type="submit"]:hover:not(:disabled) { background: #4a5aaa; }
    button[type="submit"]:disabled { opacity: .5; cursor: not-allowed; }
    .status { font-size: .9rem; }
    .status-error { color: #c0392b; }
    .success-box { text-align: center; padding: 3rem 1rem; }
    .success-box h2 { font-size: 1.3rem; margin-bottom: .5rem; }
    .success-box p { color: #555; }
    .notice {
      background: #fff8e1; border: 1px solid #f0c040;
      border-radius: 4px; padding: .75rem 1rem;
      font-size: .9rem; margin-bottom: 1.25rem;
    }
    .loading-msg { color: #666; text-align: center; padding: 3rem 1rem; }
    .error-msg { color: #c0392b; text-align: center; padding: 3rem 1rem; }
  </style>
</head>
<body>
  <div class="card" x-data="reportForm()">

    <div x-show="!ready && !loadError" class="loading-msg">Loading…</div>

    <div x-show="!!loadError" class="error-msg" x-text="loadError"></div>

    <div x-show="submitted" class="success-box">
      <h2>Report submitted!</h2>
      <p>Your committee report has been received. Thank you.</p>
    </div>

    <div x-show="ready && !submitted">
      <h1>Committee Report</h1>
      <p class="subtitle">Central Baptist Church — submit your report for the upcoming council meeting.</p>

      <div x-show="targets.length === 0" class="notice">
        No upcoming Council meetings are scheduled. Please contact the church administrator.
      </div>

      <form x-show="targets.length > 0" @submit.prevent="submit()">
        <div class="field">
          <label for="committee">Committee</label>
          <select id="committee" x-model="committee" required>
            <option value="">— select your committee —</option>
            <template x-for="c in committees" :key="c">
              <option :value="c" x-text="c"></option>
            </template>
          </select>
        </div>

        <div class="field">
          <label for="councilTarget">Council Meeting</label>
          <select id="councilTarget" x-model="councilTarget" required>
            <template x-for="t in targets" :key="t">
              <option :value="t" x-text="t"></option>
            </template>
          </select>
        </div>

        <div class="field">
          <label for="authorName">Your Name</label>
          <input type="text" id="authorName" x-model="authorName" required placeholder="First Last">
        </div>

        <div class="field">
          <label for="authorEmail">Your Email</label>
          <input type="email" id="authorEmail" x-model="authorEmail" required placeholder="you@example.com">
        </div>

        <div class="field">
          <div class="editor-label">Report</div>
          <div id="editor-container">
            <div id="editor"></div>
          </div>
        </div>

        <div class="actions">
          <button type="submit" :disabled="submitting">
            <span x-show="!submitting">Submit Report</span>
            <span x-show="submitting">Submitting…</span>
          </button>
          <span class="status" :class="{ 'status-error': statusIsError }" x-text="statusMsg"></span>
        </div>
      </form>
    </div>
  </div>

  <script>
    // After deploying the GAS web app (Deploy → Manage Deployments), paste the /exec URL here.
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbzgTnDU3nDT17HBVIxijnZKhQjUjveBSK8iQLVHd7hjKK0oZpj9YzQdZVLz9ay4Gb1uUQ/exec';

    function reportForm() {
      return {
        ready: false,
        loadError: '',
        committees: [],
        targets: [],
        committee: '',
        councilTarget: '',
        authorName: '',
        authorEmail: '',
        submitted: false,
        submitting: false,
        statusMsg: '',
        statusIsError: false,
        quill: null,

        init() {
          Quill.register({'modules/table-better': QuillTableBetter}, true);

          this.quill = new Quill('#editor', {
            theme: 'snow',
            placeholder: 'Write or paste your report here…',
            modules: {
              table: false,
              toolbar: [
                ['bold', 'italic'],
                [{ header: [2, 3, false] }],
                [{ list: 'ordered' }, { list: 'bullet' }],
                ['table-better'],
                ['clean']
              ],
              'table-better': {
                language: 'en_US',
                menus: ['column', 'row', 'merge', 'table', 'cell', 'wrap', 'copy', 'delete'],
                toolbarTable: true
              },
              keyboard: {
                bindings: QuillTableBetter.keyboardBindings
              }
            }
          });

          fetch(GAS_URL, { redirect: 'follow' })
            .then(r => r.json())
            .then(data => {
              this.committees = data.committees || [];
              this.targets    = data.targets    || [];
              this.ready = true;
              // Set after $nextTick so x-for has rendered the options before x-model syncs.
              this.$nextTick(() => {
                if (this.targets.length) this.councilTarget = this.targets[0];
              });
            })
            .catch(() => {
              this.loadError = 'Could not load form data. Make sure GAS_URL is set correctly in index.html.';
            });
        },

        async submit() {
          var bodyHTML = this.quill.root.innerHTML;
          if (!bodyHTML.trim() || bodyHTML === '<p><br></p>') {
            this.statusMsg     = 'Please write your report before submitting.';
            this.statusIsError = true;
            return;
          }
          this.submitting    = true;
          this.statusMsg     = '';
          this.statusIsError = false;

          try {
            // Content-Type: text/plain avoids a CORS preflight; GAS reads e.postData.contents.
            var r = await fetch(GAS_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify({
                committee:     this.committee,
                councilTarget: this.councilTarget,
                authorName:    this.authorName,
                authorEmail:   this.authorEmail,
                bodyHTML:      bodyHTML
              }),
              redirect: 'follow'
            });
            var data = await r.json();
            if (data.error) throw new Error(data.error);
            this.submitted = true;
          } catch (err) {
            this.statusMsg     = 'Submission failed: ' + err.message;
            this.statusIsError = true;
          } finally {
            this.submitting = false;
          }
        }
      };
    }
  </script>
</body>
</html>
